<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Google Fonts — preconnect for performance, link for CSP compatibility -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" />

    <!-- Theme color: browser chrome tint on Android/Chrome -->
    <meta name="theme-color" content="#1a1a2e" />

    <!-- iOS PWA meta tags (required for Add to Home Screen behavior) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Doppio" />

    <!-- iOS home screen icon — REQUIRED (manifest icons alone do not work on iOS) -->
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180x180.png" />

    <!-- Standard favicon -->
    <link rel="icon" type="image/png" href="/icons/pwa-192x192.png" />

    <title>Doppio — From ChatGPT Googler to AI Coworker Boss</title>

    <!-- Primary meta -->
    <meta name="title" content="Doppio — From ChatGPT Googler to AI Coworker Boss" />
    <meta name="description" content="Daily curated AI video lessons. Watch real people do real tasks with AI — then try it yourself. No coding. No app store. Just a URL." />

    <!-- Open Graph / WhatsApp / iMessage / Slack / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://doppio.kookyos.com" />
    <meta property="og:title" content="Doppio — From ChatGPT Googler to AI Coworker Boss" />
    <meta property="og:description" content="Daily curated AI video lessons. Watch real people do real tasks with AI — then try it yourself. No coding. No app store." />
    <meta property="og:image" content="https://doppio.kookyos.com/og-badge.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Doppio — From ChatGPT Googler to AI Coworker Boss" />
    <meta property="og:site_name" content="Doppio" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://doppio.kookyos.com" />
    <meta name="twitter:title" content="Doppio — From ChatGPT Googler to AI Coworker Boss" />
    <meta name="twitter:description" content="Daily curated AI video lessons. Watch, try, repeat. No coding." />
    <meta name="twitter:image" content="https://doppio.kookyos.com/og-badge.png" />
    <meta name="twitter:image:alt" content="Doppio — From ChatGPT Googler to AI Coworker Boss" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
